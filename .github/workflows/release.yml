name: Cross-Platform Rust Library Release

on:
  push:
    tags:
      - '*'

jobs:
  build-macos:
    name: Build macOS ARM
    runs-on: macos-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.FISHHOOK_DEPLOY_KEY }}

      - name: Configure Git to use SSH
        run: |
          git config --global url."ssh://git@github.com/".insteadOf "https://github.com/"

      - name: Install Rust targets
        run: |
          rustup target add aarch64-apple-darwin

      - name: Build macOS dylib
        run: cargo build --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: target/release/libmemtrace_lib.dylib

  build-linux:
    name: Build Linux (glibc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Linux shared library
        run: cargo build --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-gnu
          path: target/release/libmemtrace_lib.so

  release:
    name: Create GitHub Release
    permissions:
      contents: write
    needs:
      - build-macos
      - build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            all-artifacts/**/*.dylib
            all-artifacts/**/*.so
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
